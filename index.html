<form onsubmit="submitForm(event)" name="resgisterForm" id="resgisterForm" role="form">

<div class="result_wrapper" id="resultsbox" style="display: none;"></div>
<div class="result_wrapper" style="text-align: center;display: none;">

    <a href="" style="color:red"><strong>Back</strong></a>
</div>

<!-- PDF Generate Script -->
<script>            
    var form = $('#resultsbox'),         
    cache_width = form.width(),         
    a4 = [595.28, 841.89]; // for a4 size paper width and height
    
    //create pdf        
    function createPDF() {            
        getCanvas().then(function (canvas) {                
            var img = canvas.toDataURL("image/png"),                 
            doc = new jsPDF({                     
                unit: 'px',                     
                format: 'a4'                 
            });                
            doc.addImage(img, 'PNG', 15, 15);                
            doc.save('WBBSE_Result_RaiganjLooters.pdf');                
            form.width(cache_width);              
            document.getElementById("resultoption").style.display = "block";
        });        
    }
    
    // create canvas object        
    function getCanvas() {          
        document.getElementById("resultoption").style.display = "none";            
        form.width((a4[0] * 1.33333) - 80).css('max-width', 'none');            
        return html2canvas(form, {                
            imageTimeout: 2000,                
            removeContainer: true            
        });        
    }
</script>

<!-- Main API & Result Processing Script -->
<script type="text/javascript">  
    function submitForm(event){    
        event.preventDefault();    
        
        const roll = document.getElementById("rollnumber").value.trim().toUpperCase();
        const dob = document.getElementById("dob").value.trim();
        const submitBtn = document.getElementById("submitBtn");
        const errorMsg = document.getElementById("errorMsg");

        // Basic formatting check
        if(roll.length !== 11 || dob.length !== 6) {
            errorMsg.innerHTML = 'Please enter a valid 11-digit Roll Number and 6-digit DOB';
            errorMsg.style.display = "block";
            return;
        }

        submitBtn.value = "Fetching Result...";
        submitBtn.disabled = true;
        errorMsg.style.display = "none";

        // Fetching data from Cloudflare Worker
        fetch(`https://wb10.edutips.workers.dev/?roll=${roll}&dob=${dob}`)
        .then((response) => {
            if (!response.ok) {
                throw new Error("Result Not Found");
            }
            return response.json();
        })
        .then((data) => {
            console.log("Success:", data);
            process_result(data);
        })
        .catch(function(error) {
            console.log("Error:", error);
            submitBtn.value = "Get Result";
            submitBtn.disabled = false;
            errorMsg.innerHTML = 'Not Published Yet';       
            errorMsg.style.display = "block";
        });  
    }

        document.getElementById("resultsinput").style.display = "none";

</script>

<!-- Validation Scripts -->
<script type="text/javascript">  
    function removeSpaces(string) {      
        return string.split(' ').join('');  
    }                
    function letternumberonly(key) {  
        var keycode = (key.which) ? key.which : key.keyCode;       
        var ch = String.fromCharCode(keycode);       
        var filter = /^[0-9a-zA-Z\ \']+$/;       
        if(!filter.test(ch)){           
            return false;       
        } else return true;    
    }        
    function validatenumerics(key) {         
        var keycode = (key.which) ? key.which : key.keyCode;         
        if (keycode > 31 && (keycode < 48 || keycode > 57)) {           
            return false;         
        } else return true;    
    }    
    function letteronly(key) {      
        var isAlphaNum = String.fromCharCode(key.charCode).match(/^[a-zA-Z\ \']+$/);      
        if(isAlphaNum || key.charCode == 0) {        
            return true;       
        } else {        
            return false;      
        }     
    }    
</script>
