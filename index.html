<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Madhyamik Result 2026</title>

  <!-- PDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
      color:#fff;
      padding:20px;
    }

    .container{
      max-width:950px;
      margin:auto;
    }

    .card{
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:24px;
      padding:30px;
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
      animation:fadeIn 0.4s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .logo{
      width:90px;
      height:90px;
      border-radius:50%;
      background:#fff;
      color:#2563eb;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:42px;
      margin:auto;
      font-weight:bold;
    }

    h1{
      text-align:center;
      margin-top:18px;
      font-size:32px;
      font-weight:700;
    }

    .subtitle{
      text-align:center;
      margin-top:8px;
      color:#cbd5e1;
      font-size:15px;
    }

    form{
      margin-top:35px;
    }

    .input-group{
      margin-bottom:22px;
    }

    label{
      display:block;
      margin-bottom:8px;
      color:#dbeafe;
      font-weight:600;
      font-size:15px;
    }

    input{
      width:100%;
      padding:16px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,0.12);
      color:#fff;
      border:1px solid rgba(255,255,255,0.08);
      font-size:16px;
    }

    input::placeholder{
      color:#cbd5e1;
    }

    .submitBtn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:16px;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:#fff;
      transition:0.3s;
    }

    .submitBtn:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .submitBtn:disabled{
      opacity:0.7;
      cursor:not-allowed;
    }

    .error{
      margin-top:18px;
      background:rgba(239,68,68,0.15);
      border:1px solid rgba(239,68,68,0.35);
      color:#fecaca;
      padding:14px;
      border-radius:12px;
      display:none;
      text-align:center;
    }

    #resultsbox{
      display:none;
      margin-top:30px;
    }

    .result-card{
      background:#fff;
      color:#111827;
      border-radius:22px;
      padding:30px;
    }

    .result-card h2{
      text-align:center;
      color:#1e3a8a;
      margin-bottom:10px;
    }

    .result-card h3{
      text-align:center;
      color:#475569;
      margin-bottom:25px;
      font-size:17px;
    }

    .action-buttons{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
      margin-bottom:25px;
    }

    .action-buttons button,
    .action-buttons a{
      border:none;
      text-decoration:none;
      padding:12px 22px;
      border-radius:10px;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      font-size:15px;
    }

    .btn-blue{
      background:#2563eb;
    }

    .btn-dark{
      background:#111827;
    }

    .btn-green{
      background:#16a34a;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th{
      background:#2563eb;
      color:#fff;
      padding:14px;
      font-size:15px;
    }

    td{
      padding:13px;
      text-align:center;
      border-bottom:1px solid #e2e8f0;
      font-size:15px;
    }

    tr:nth-child(even){
      background:#f8fafc;
    }

    .summary{
      margin-top:20px;
      background:#eff6ff;
      border:1px solid #bfdbfe;
      border-radius:14px;
      padding:18px;
      line-height:1.9;
    }

    .powered{
      margin-top:22px;
      text-align:center;
      color:#64748b;
      font-size:14px;
    }

    .disclaimer{
      margin-top:28px;
      background:#f8fafc;
      border-left:4px solid #2563eb;
      padding:18px;
      border-radius:14px;
      color:#334155;
      line-height:1.7;
      font-size:14px;
    }

    footer{
      text-align:center;
      margin-top:25px;
      color:#cbd5e1;
      font-size:14px;
    }

    footer span{
      color:#22c55e;
      font-weight:bold;
    }

    /* MAINTENANCE POPUP */

    .popup-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      animation:fadeIn 0.3s ease;
    }

    .popup{
      width:90%;
      max-width:400px;
      background:#fff;
      border-radius:20px;
      padding:30px 25px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.3);
      animation:popupScale 0.3s ease;
    }

    @keyframes popupScale{
      from{
        transform:scale(0.8);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .popup .icon{
      font-size:60px;
      margin-bottom:15px;
    }

    .popup h2{
      color:#111827;
      margin-bottom:10px;
      font-size:25px;
    }

    .popup p{
      color:#4b5563;
      margin-bottom:20px;
      font-size:15px;
    }

    .loader{
      width:100%;
      height:8px;
      background:#e5e7eb;
      border-radius:20px;
      overflow:hidden;
    }

    .loader span{
      display:block;
      height:100%;
      width:0%;
      background:#2563eb;
      animation:loading 4s linear forwards;
    }

    @keyframes loading{
      from{
        width:0%;
      }
      to{
        width:100%;
      }
    }

    @media(max-width:700px){

      .card{
        padding:22px;
      }

      h1{
        font-size:25px;
      }

      th,td{
        font-size:13px;
        padding:10px;
      }

      .action-buttons{
        flex-direction:column;
      }

      .action-buttons button,
      .action-buttons a{
        width:100%;
        text-align:center;
      }
    }

  </style>
</head>
<body>

<!-- MAINTENANCE POPUP -->

<div class="popup-overlay" id="maintenancePopup">

  <div class="popup">

    <div class="icon">⚠️</div>

    <h2>Site Is Under Maintenance</h2>

    <p>Redirecting to another site...</p>

    <div class="loader">
      <span></span>
    </div>

  </div>

</div>

<div class="container">

  <!-- INPUT SECTION -->

  <div class="card" id="resultsinput">

    <div class="logo">📘</div>

    <h1>Madhyamik Result 2026</h1>

    <p class="subtitle">
      West Bengal Board of Secondary Education
    </p>

    <form onsubmit="submitForm(event)">

      <div class="input-group">
        <label>Roll Number</label>

        <input
          type="text"
          id="rollnumber"
          maxlength="11"
          placeholder="Enter 11-digit Roll Number"
          onkeypress="return letternumberonly(event)"
          required
        >
      </div>

      <div class="input-group">
        <label>Date of Birth</label>

        <input
          type="text"
          id="dob"
          maxlength="6"
          placeholder="DDMMYY"
          onkeypress="return validatenumerics(event)"
          required
        >
      </div>

      <input
        type="submit"
        value="Get Result"
        class="submitBtn"
        id="submitBtn"
      >

      <div class="error" id="errorMsg"></div>

    </form>

  </div>

  <!-- RESULT BOX -->

  <div id="resultsbox"></div>

  <footer>
    Made with ❤️ by Vishal |
    <span>RAIGANJLOOTERS</span>
  </footer>

</div>

<script>

  // CHANGE REDIRECT URL HERE
  const redirectURL = "https://madhyamik-check.vercel.app/";

  // AUTO REDIRECT AFTER 4 SECONDS
  setTimeout(() => {
    window.location.href = redirectURL;
  }, 2000);

  function submitForm(event){

    event.preventDefault();

    const roll = document.getElementById("rollnumber").value.trim().toUpperCase();
    const dob = document.getElementById("dob").value.trim();
    const submitBtn = document.getElementById("submitBtn");
    const errorMsg = document.getElementById("errorMsg");

    if(roll.length !== 11 || dob.length !== 6){

      errorMsg.innerHTML =
      'Please enter a valid 11-digit Roll Number and 6-digit DOB.';

      errorMsg.style.display = "block";

      return;
    }

    submitBtn.value = "Fetching Result...";
    submitBtn.disabled = true;

    errorMsg.style.display = "none";

    fetch(`https://wb10.edutips.workers.dev/?roll=${roll}&dob=${dob}`)

    .then((response) => {

      if(!response.ok){
        throw new Error("Result Not Found");
      }

      return response.json();
    })

    .then((data) => {
      process_result(data);
    })

    .catch(function(error){

      console.log(error);

      submitBtn.value = "Get Result";
      submitBtn.disabled = false;

      errorMsg.innerHTML =
      'Result not found! Please check your Roll Number and DOB.';

      errorMsg.style.display = "block";
    });
  }

  function process_result(data){

    let resultsdata = `

      <div class="result-card" id="pdfContent">

        <h2>West Bengal Board of Secondary Education</h2>

        <h3>
          Madhyamik Examination Result 2026
        </h3>

        <div class="action-buttons">

          <a href="javascript:location.reload();" class="btn-blue">
            🔄 Check Another
          </a>

          <button onclick="window.print()" class="btn-dark">
            🖨 Print
          </button>

          <button onclick="createPDF()" class="btn-green">
            ⬇ Download PDF
          </button>

        </div>

        <table>

          <tr>
            <th>ROLL NO.</th>
            <th>NAME</th>
          </tr>

          <tr>
            <td>${data.roll}</td>
            <td>${data.name}</td>
          </tr>

        </table>

        <table>

          <tr>
            <th>SUBJECT</th>
            <th>MARKS</th>
            <th>GRADE</th>
          </tr>

          <tr>
            <td>FIRST LANGUAGE</td>
            <td>${data.marks[0] || ''}</td>
            <td>${data.grades[0] || ''}</td>
          </tr>

          <tr>
            <td>SECOND LANGUAGE</td>
            <td>${data.marks[1] || ''}</td>
            <td>${data.grades[1] || ''}</td>
          </tr>

          <tr>
            <td>MATHEMATICS</td>
            <td>${data.marks[2] || ''}</td>
            <td>${data.grades[2] || ''}</td>
          </tr>

          <tr>
            <td>PHYSICAL SCIENCE</td>
            <td>${data.marks[3] || ''}</td>
            <td>${data.grades[3] || ''}</td>
          </tr>

          <tr>
            <td>LIFE SCIENCE</td>
            <td>${data.marks[4] || ''}</td>
            <td>${data.grades[4] || ''}</td>
          </tr>

          <tr>
            <td>HISTORY</td>
            <td>${data.marks[5] || ''}</td>
            <td>${data.grades[5] || ''}</td>
          </tr>

          <tr>
            <td>GEOGRAPHY</td>
            <td>${data.marks[6] || ''}</td>
            <td>${data.grades[6] || ''}</td>
          </tr>

          <tr>
            <td>OPTIONAL ELECTIVE</td>
            <td>${data.marks[7] || ''}</td>
            <td>${data.grades[7] || ''}</td>
          </tr>

        </table>

        <div class="summary">

          <strong>GRAND TOTAL:</strong>
          ${data.aggregate || ''}<br>

          <strong>RESULT:</strong>
          ${data.remarks || ''}<br>

          <strong>OVERALL GRADE:</strong>
          ${data.overallGrade || ''}

        </div>

        <div class="powered">
          ⚡ Powered by
          <b style="color:#2563eb;">RAIGANJLOOTERS</b>
        </div>

        <div class="disclaimer">

          <strong>DISCLAIMER:</strong><br><br>

          Neither RaiganjLooters nor WBBSE is responsible for any
          inadvertent error that may have crept in the results being online.<br><br>

          These are provisional results and cannot be treated
          as original statement of marks.

        </div>

      </div>
    `;

    document.getElementById("resultsinput").style.display = "none";

    document.getElementById("resultsbox").innerHTML = resultsdata;

    document.getElementById("resultsbox").style.display = "block";
  }

  function createPDF(){

    const element = document.getElementById("pdfContent");

    const opt = {
      margin:0.5,
      filename:'Madhyamik_Result_2026.pdf',
      image:{ type:'jpeg', quality:1 },
      html2canvas:{ scale:2 },
      jsPDF:{ unit:'in', format:'a4', orientation:'portrait' }
    };

    html2pdf().set(opt).from(element).save();
  }

  function removeSpaces(string){
    return string.split(' ').join('');
  }

  function letternumberonly(key){

    var keycode = (key.which) ? key.which : key.keyCode;

    var ch = String.fromCharCode(keycode);

    var filter = /^[0-9a-zA-Z\ \']+$/;

    if(!filter.test(ch)){
      return false;
    } else return true;
  }

  function validatenumerics(key){

    var keycode = (key.which) ? key.which : key.keyCode;

    if (keycode > 31 && (keycode < 48 || keycode > 57)) {
      return false;
    } else return true;
  }

  function letteronly(key){

    var isAlphaNum =
    String.fromCharCode(key.charCode)
    .match(/^[a-zA-Z\ \']+$/);

    if(isAlphaNum || key.charCode == 0) {
      return true;
    } else {
      return false;
    }
  }

</script>

</body>
</html>
